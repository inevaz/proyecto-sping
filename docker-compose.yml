version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: comercios_db
    environment:
      POSTGRES_DB: comercios_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./back
    container_name: comercios_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/comercios_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8081:8081"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./front
    container_name: comercios_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: